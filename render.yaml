services:
  # خدمة البوت الرئيسية
  - type: worker
    name: telegram-transfer-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-bot-db
          property: connectionString

  # قاعدة بيانات PostgreSQL
  - type: postgresql
    name: telegram-bot-db
    plan: free
    databaseName: telegram_bot
    ipAllowList: []  # مفتوح للاتصالات الداخلية فقط

  # خدمة Cron لإبقاء البوت نشطاً (للتغلب على سكون Render)
  - type: cron
    name: keep-awake
    runtime: python
    schedule: "*/10 * * * *"  # كل 10 دقائق
    buildCommand: ""
    startCommand: python -c "import requests; requests.get('https://your-bot-url.onrender.com/health')"
